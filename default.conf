server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ =404;
    }

    location /areademembros {
        root /usr/share/nginx/html;
        index login.html;
        try_files $uri $uri/ /areademembros/login.html;
    }
}
